      decision: "Start dashboard-first: add a Hermes Control Center widget to the existing draggable dashboard. It should truthfully surface Composio/MCP app setup, Hermes-scoped Slack/Discord/iMessage channel readiness, and Hermes scheduled work using existing local config/cron sources, with routes to the real setup pages. This gives the user a live dashboard surface now while deeper Slack/Discord/iMessage implementation remains queued."
