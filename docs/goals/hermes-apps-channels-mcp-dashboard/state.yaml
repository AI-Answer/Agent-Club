      result: done
      summary: "Mapped the existing seams: dashboard snapshot/types/rendering already support draggable widgets; MCP config is stored in agent.config mcp.config; Composio uses Tool Router session creation through mcpBridge and a stdio proxy with COMPOSIO_MCP_URL plus x-api-key-backed API key; channels already expose plugin status and include Slack/Discord types, but settings still treats them as coming soon and iMessage has no native plugin; Scheduled Tasks already lists CronService jobs through useAllCronJobs and dashboard summaries read cronService.listJobs."
