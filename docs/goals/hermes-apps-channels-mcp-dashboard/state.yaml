# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hermes Apps, Channels, and Scheduled Work Dashboard"
  slug: "hermes-apps-channels-mcp-dashboard"
  kind: specific
  tranche: "Complete successive safe verified slices until Agent Club has a demoable Hermes apps/MCP widget, Hermes channel setup UI, and Scheduled Tasks tracking for Hermes work."
  status: active
  intake:
    original_request: "Add a Composio-style MCP app widget, Hermes Slack/Discord/iMessage channels UI, and make Hermes cron jobs and scheduled tasks show in Scheduled Tasks."
    interpreted_outcome: "Agent Club exposes a polished Hermes control surface for connecting apps as MCP tools, configuring Hermes channels, and monitoring Hermes scheduled work from the real Scheduled Tasks surface."
    input_shape: specific
    audience: "Sam and future Agent Club users who want Hermes to act as a personal chief of staff."
    authority: requested
    proof_type: demo
    completion_proof: "A live Agent Club demo shows the app/MCP widget and attach modal, Hermes-only Slack/Discord/iMessage channel controls, Hermes scheduled work in Scheduled Tasks, and passing verification commands."
    likely_misfire: "Shipping a polished mock marketplace or generic channels page that does not use real Composio/MCP, Hermes, or scheduled-task data paths."
    blind_spots_considered:
      - "Composio's current official Tool Router MCP flow must be verified before implementation."
      - "OAuth/API-key credentials and secrets must not be created, sent, or stored unsafely."
      - "iMessage likely has local macOS/native constraints that differ from Slack and Discord."
      - "Discord and Slack may require different connector/auth/status semantics."
      - "Hermes cron jobs and Scheduled Tasks need one source of truth to avoid drift."
      - "The UI should be compact and scrollable, not a large empty marketplace."
    existing_plan_facts:
      - "Screenshot reference: App Marketplace grid with cards, install buttons, auth badges, tool and trigger counts, tags, and an installed-app count."
      - "Build an embedded/widget-like app/MCP browser and a Composio attach modal."
      - "Apps should be attachable as MCPs that Hermes can use."
      - "Add Slack, Discord, and iMessage channels only for Hermes Chief of Staff."
      - "Track Hermes cron jobs and scheduled tasks in the Scheduled Tasks page."
      - "Prior memory points to Composio Tool Router MCP over HTTP with an x-api-key header, not an old guessed stdio recipe."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/hermes-apps-channels-mcp-dashboard/"
    command: "npx goalbuddy board docs/goals/hermes-apps-channels-mcp-dashboard"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

