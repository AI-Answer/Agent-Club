# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Agent Club — Rebrand, Multica Cleanup & Jarvis Mode"
  slug: "agent-club-jarvis"
  kind: existing_plan # specific | open_ended | existing_plan | recovery | audit
  tranche: "Tranche 2 (jarvis-hud look + Hermes brain) delivered, reviewed, fixed, verified live, and shipped (PR #3)."
  status: done # active | blocked | done
  intake:
    original_request: "Add full-screen voice Jarvis Mode for the Hermes agent; remove slow local multica and iframe the hosted one; cherry-pick relevant AionUi upstream; rebrand to Agent Club; everything tested."
    interpreted_outcome: "Rebranded Agent Club app where local multica is replaced by a hosted iframe and a Hermes-only full-screen Jarvis Mode supports real-time voice + computer control via Hermes's Peekaboo CUA driver, with MCP pre-wired and an AC/DC-style music toggle."
    input_shape: existing_plan
    audience: "User + people they demo Jarvis Mode to"
    authority: approved
    proof_type: demo
    completion_proof: "Jarvis Mode opens full-screen only for installed Hermes; realtime voice convo works; a spoken command drives the computer via Peekaboo CUA; music button plays; local multica removed + hosted iframe loads with perf gain; Agent Club rebrand visible; relevant cherry-picks applied; touched tests green."
    likely_misfire: "Shipping a visual-only fake Jarvis that cannot talk or control anything, or breaking the app by removing multica wrong, or harming customizations via aggressive upstream merge."
    blind_spots_considered:
      - "CONFIRMED: Nous Portal is text-only (no audio). Voice needs STT(browser) + TTS(OpenAI/Kokoro), brain stays Hermes."
      - "CONFIRMED: hosted multica URL is NOT in repo; app only iframes localhost:3330. User must supply hosted URL + auth/CSP model."
      - "CONFIRMED: Hermes CUA driver = Peekaboo (peekabooProxy/mcpBridge); macOS Accessibility/Screen-Recording grant required."
      - "AC/DC master is copyrighted; need royalty-free substitute."
      - "No upstream remote configured; cherry-pick needs user to add iOfficeAI/AionUi remote."
    existing_plan_facts:
      - "Remove local multica (apps/agent-manager, booted at src/index.ts:537); iframe the hosted multica."
      - "Jarvis Mode full-screen, real-time voice, Hermes-only when installed."
      - "Reuse Hermes's existing Peekaboo CUA driver for control."
      - "Voice = Hermes's native voice mode (user steer 2026-06-25); brain + speech both via Hermes. Browser STT + local TTS only as last-resort fallback."
      - "MCP connections pre-wired for Hermes inside Jarvis (reuse mcpBridge)."
      - "Music toggle button; visuals match the reel; feature-flag like TEAM_MODE_ENABLED."
      - "Upstream = cherry-pick relevant AionUi changes, not full rebase. Rebrand AionUi -> Agent Club."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live # not_requested | starting | live | generated | blocked
    url: "http://goalbuddy.localhost:41737/agent-club-jarvis/"
    command: "npx goalbuddy board docs/goals/agent-club-jarvis"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

