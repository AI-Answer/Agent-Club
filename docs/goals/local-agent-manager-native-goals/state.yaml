version: 2

goal:
  title: "Native Goals in Local Agent Manager"
  slug: "local-agent-manager-native-goals"
  kind: existing_plan
  tranche: "Build native project-scoped goals in Local Agent Manager, expand goals into normal issue work, route work to agents, and verify the local workflow."
  status: done
  intake:
    original_request: "Make the native Local Agent Manager goals plan into a /goal, spin up the board, and run it."
    interpreted_outcome: "Local Agent Manager natively supports planning project goals, expanding them into issue work, assigning agents, and tracking progress over time."
    input_shape: existing_plan
    audience: "Sam using Agent Club as a local agent operating cockpit."
    authority: requested
    proof_type: test
    completion_proof: "Goal CRUD, goal-linked issue boards, planner expansion, agent/task tracking, local UI smoke check, repo checks, commit, and push are complete."
    likely_misfire: "Shipping a GoalBuddy sync, a duplicate board system, or project rename instead of native many-goals-per-project functionality in Local Agent Manager."
    blind_spots_considered:
      - "Projects must remain top-level containers; goals are many-per-project."
      - "Cards inside a goal should be normal Multica issues."
      - "Sub-agent tracking should use existing agent, squad, issue, task-run, comment, and execution-log surfaces in v1."
      - "Hermes Chief of Staff is preferred for planning but cannot be a hard dependency."
      - "Goal runs need a GoalBuddy-agents-like readiness check so required planner, worker, and reviewer sub-agents are selected or surfaced as missing before execution."
    existing_plan_facts:
      - "Add a first-class goal model scoped to workspace and project."
      - "Add goal_id to issues and issue APIs."
      - "Add goal UI surfaces: sidebar nav, project detail goals section, goal detail planning room, and scoped board."
      - "Add planner expansion that creates or queues normal Multica issues for agents."
      - "Add goal-run agent readiness so required sub-agents are enabled, selected, tested, and used when the goal plan requires them."
      - "GoalBuddy is execution scaffolding only, not product architecture."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/local-agent-manager-native-goals/"
    command: "npx goalbuddy board /Users/saminyasar/Agent-Club/docs/goals/local-agent-manager-native-goals"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

