version: 2

goal:
  title: "Personal Chief-of-Staff Dashboard"
  slug: "personal-chief-of-staff-dashboard"
  kind: broad_product_request
  tranche: "Add dashboard daily morning refresh, hard refresh, context-driven rebuild, loading recovery, three-focus chief-of-staff view, and restart Agent Club so Sam can see it."
  status: done
  intake:
    original_request: "Make a personal Dashboard under Search that acts as a personal chief of staff using memory, email, meetings, todo lists, active agent work, automations, queued tasks, completed tickets, AIOS time saved, and automation recommendations; create the plan, make it a /goal, spin up the board, and implement it."
    interpreted_outcome: "Agent Club has a usable native /dashboard route and sidebar entry that shows grounded local chief-of-staff insights from available sources while honestly marking disconnected sources."
    input_shape: broad_product_request
    audience: "Sam using Agent Club as a local AIOS cockpit."
    authority: requested
    proof_type: local_app
    completion_proof: "Dashboard tab is implemented under Search, /dashboard is routed, data loads from local services where available, disconnected sources are honest, checks pass, GoalBuddy board is live, daily morning refresh is registered, hard refresh and context rebuild controls are present, Sam's three current priorities are pinned as the main focus, and Agent Club is restarted."
    likely_misfire: "A static mock dashboard, a plan-only artifact, or fabricated email/calendar/todo insights."
    blind_spots_considered:
      - "Honcho should be treated as the user's memory source only when configured and reachable."
      - "Email, calendar, and todo data may not be connected yet."
      - "Raw private content should not be persisted by default."
      - "Dashboard must load quickly from the last local snapshot and refresh on demand."
      - "The sidebar location matters: directly under Search."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_unrelated_changes: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/personal-chief-of-staff-dashboard/"
    command: "npx goalbuddy board /Users/saminyasar/Agent-Club/docs/goals/personal-chief-of-staff-dashboard"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

