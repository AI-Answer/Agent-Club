# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "JourneyKits Skills Discovery"
  slug: "journeykits-skills-discovery"
  kind: specific
  tranche: "Discover JourneyKits, existing Agent Club skills surfaces, and local agent skill wiring, then implement verified discovery, install, supported-agent skill availability, and post/publish slices until the full integration works or is explicitly owner/API-gated."
  status: done
  intake:
    original_request: "Make sure the whole Agent Club application, with all supported agents, is integrated well with JourneyKits and the skills. After it is integrated, push it to GitHub and run the goal after planning."
    interpreted_outcome: "Agent Club should support JourneyKits as a skills source with discovery, install, supported-agent skill availability, and publish/post workflows, then push the finished work to GitHub."
    input_shape: specific
    audience: "Agent Club users and skill creators"
    authority: approved
    proof_type: demo
    completion_proof: "Local Agent Club demo shows JourneyKits discovery, install, supported-agent skill availability, and posting/publishing or a documented owner-gated publishing path, with checks passing and the finished work pushed to GitHub."
    likely_misfire: "Add only a link or placeholder card without real discovery/install/agent-skill/post behavior."
    blind_spots_considered:
      - "JourneyKits may not expose a public API or may require browser/session/auth access."
      - "Skill package formats may differ between JourneyKits, Codex skills, Claude skills, and Agent Club skills."
      - "Local agents may consume skills through different files, paths, prompts, or generated config, so all-agent support must be mapped and caveated."
      - "Posting skills may require publisher credentials, ownership checks, moderation, or account setup."
      - "Install flows must not overwrite user skill folders or import unsafe files silently."
      - "Existing Skills Hub, skill-installer, and Agent Club whitelabel surfaces need to be preserved."
    existing_plan_facts:
      - "Use https://www.journeykits.ai/ as the discovery source."
      - "Users should be able to install skills from JourneyKits."
      - "Installed JourneyKits skills should become available to supported detected agents and existing assistant/skills flows."
      - "Users should be able to post or publish skills to JourneyKits when supported."
      - "After the goal is done, the finished work must be pushed to GitHub."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  final_completion_requires_git_push: true

agents:
  # installed | bundled_not_installed | missing | unknown
  # Bundled templates were found in the GoalBuddy skill cache, but no installed user/project agent configs were verified.
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  # none | local | github_projects | both | unknown
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41738/journeykits-skills-discovery/"
    command: "npx goalbuddy board /Users/saminyasar/Agent-Club/docs/goals/journeykits-skills-discovery --host 127.0.0.1 --port 41738"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map existing Agent Club skills discovery/install/publish surfaces, local agent skill wiring, and JourneyKits capabilities without changing implementation files."
    inputs:
      - "goal.md"
      - "https://www.journeykits.ai/"
      - "Current repository skills/settings/plugin surfaces"
      - "Existing skill-installer and Skills Hub behavior"
      - "Local supported agent skill paths and config propagation behavior"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Browsing JourneyKits is allowed during /goal Scout work, not during goal prep."
      - "Record whether JourneyKits has public APIs, browser-only flows, auth, package formats, and posting requirements."
      - "Record how Codex, Claude, OpenClaw, Gemini, Agent Club assistants, and any other supported detected agents consume skills or skill instructions."
      - "Distinguish verified source behavior from guesses."
    expected_output:
      - "Current Agent Club skill surface map"
      - "Supported-agent skill wiring map"
      - "JourneyKits capability/API/auth map"
      - "Skill format compatibility notes"
      - "Candidate install flow"
      - "Candidate post/publish flow"
      - "Files and verification commands for likely implementation slices"
    receipt:
      result: done
      summary: "Mapped existing skill surfaces and JourneyKits APIs. Agent Club has shared user skills, builtin auto skills, external path import/export, assistant selected skills, ACP indexing, OpenClaw full-text injection, and Gemini workspace-copy behavior. Agent Manager has workspace skills, local runtime skill import, and URL skill import. JourneyKits exposes public registry, search/list, install-targets, /skill, /skill.zip, target install payloads, publish/import endpoints, and owner/auth-gated account/org APIs."
      evidence:
        - "JourneyKits manifest: /.well-known/agent-kit.json advertises search, install, publish, versioning, install targets, MCP, skill.zip, and publish-to-journey endpoints."
        - "JourneyKits /api/install-targets lists codex/AGENTS.md, claude-code/CLAUDE.md, cursor/.cursor, openclaw/journey-kits, agent/.skills and summary-file targets."
        - "JourneyKits /api/kits and /api/kits/search return public kits; /api/kits/{owner}/{slug}/skill.zip contains SKILL.md plus references for a sample kit."
        - "src/process/bridge/fsBridge.ts owns local skill import, list, external scan/export, and skills-market auto skill toggles."
        - "src/process/task/AcpSkillManager.ts and conversationBridge.ts make selected user skills available to assistants/agents through index or full-content injection."
        - "apps/agent-manager/server/internal/handler/skill.go already imports URL skills from ClawHub, Skills.sh, and GitHub; it can safely add JourneyKits as another source."
      candidate_install_flow: "Search/list JourneyKits in Skills Hub, download skill.zip for a selected owner/slug, safely extract text files into the user skills directory under the SKILL.md frontmatter name, then refresh the existing skills list so assistants and supported agents can select/use it."
      candidate_publish_flow: "JourneyKits exposes publish-to-journey, import, auth, org, and protected MCP endpoints; full in-app publishing appears credential/account gated, so the safe first slice should expose import/install now and document/route publisher-gated posting later unless credentials are available."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the safest first JourneyKits plus supported-agent skills integration slice from Scout evidence."
    inputs:
      - "T001 receipt"
      - "goal.md"
    constraints:
      - "Do not implement."
      - "Do not select a credentials-dependent posting slice before discovery/install and supported-agent skill availability have a verified local path."
      - "Require exact allowed_files, verify commands, and stop_if conditions for the first Worker."
      - "Reject placeholder-only work."
    expected_output:
      - "Decision"
      - "Prioritized slices"
      - "First Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Blocked owner-gated JourneyKits requirements"
