      - "Prior sheet facts: month tabs, May tab, freeform day entries, Main Objectives, Notes, gray past days, today highlight, right-click/button agent dispatch."
      - "Memory facts: Local Agent Manager is product source of truth; /goal prep creates shell; /goal expansion queues planner/worker tasks."
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer concrete file-path evidence and exact commands."
      - "Do not re-argue product architecture; start from Local Agent Manager and Multica."
    expected_output:
      - "Repo map for planner backend, frontend, routing, and dispatch surfaces."
      - "Exact candidate files/directories for implementation."
      - "Existing API/query/migration patterns to reuse."
      - "Verification commands and likely smoke-test path."
      - "Risks and recommended first Worker slice."
    receipt:
      result: done
      summary: "Mapped the planner integration path through apps/agent-manager: Go API/router/sqlc migrations, @multica/core API hooks/types, shared @multica/views page, Next route, desktop React route, sidebar paths/nav, and existing project/goal/issue/agent task creation flows."
      evidence:
        - "Backend routes live in apps/agent-manager/server/cmd/server/router.go under authenticated workspace-scoped /api routes; planner should mount beside issues/projects/goals."
        - "Persistence uses migrations plus sqlc from apps/agent-manager/server/sqlc.yaml, queries in server/pkg/db/queries, generated code in server/pkg/db/generated."
        - "Issue creation already queues agent work when assignee_type=agent and status is not backlog through Handler.CreateIssue -> TaskService.EnqueueTaskForIssue."
        - "Project/goal APIs exist in server/internal/handler/project.go and goal.go and @multica/core projects/goals queries/mutations."
        - "Shared UI pages live in packages/views and are mounted by apps/web routes plus apps/desktop/src/renderer/src/routes.tsx."
        - "Navigation paths are centralized in packages/core/paths/paths.ts and app sidebar labels live in packages/views/locales/*/layout.json."
      risks:
        - "sqlc generation is required after adding planner queries."
        - "A live daemon is not required to prove task queue creation, but final app smoke may only verify dispatch linkage unless a local runtime is online."
        - "Existing dirty worktree has unrelated Agent Club edits; avoid reverting or touching unrelated dashboard/memory changes."

