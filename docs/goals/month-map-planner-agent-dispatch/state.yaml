version: 2

goal:
  title: "Month Map Planner And Agent Dispatch"
  slug: "month-map-planner-agent-dispatch"
  kind: existing_plan
  tranche: "Implement the complete v1 Month Map planner vertical slice inside Agent Club's embedded Local Agent Manager, including persistence, UI, agent dispatch, agent context/update integration, and cross-app verification."
  status: done
  intake:
    original_request: "Make a GoalBuddy goal, then run /goal to develop the whole warm map planner feature and test it across the application."
    interpreted_outcome: "Agent Club has a working Local Agent Manager Month Map that mirrors Samin's current Google Sheets warm map workflow and can dispatch/update Multica agent work from planner items."
    input_shape: existing_plan
    audience: "Samin and local Multica agents"
    authority: requested
    proof_type: test
    completion_proof: "Focused tests and an app smoke test show the Month Map opens to the current month, edits/saves entries/objectives/notes/tab colors, grays past days and highlights today, creates/links a Multica project/goal/issue from a planner entry, dispatches an agent task, injects planner context, and reflects agent/status updates back into the planner."
    likely_misfire: "Shipping a standalone calendar, annual dashboard, or GoalBuddy-like board that looks polished but does not preserve the freeform month workflow or connect to Multica execution."
    blind_spots_considered:
      - "Whether planner entries should be first-class records or issue-only records."
      - "How to keep day cells freeform while preserving structured links to issues/goals/projects."
      - "How agents learn today's priorities without scraping UI text."
      - "How agent-created or agent-updated work writes back to the planner."
      - "How deep links open inside Agent Club rather than an external browser."
      - "How to test app-wide behavior without depending on a production daemon."
    existing_plan_facts:
      - "Use the user's Google Sheet `Samin - War Map 2026` as behavioral inspiration."
      - "The user lives in the current month tab, especially May-like planning, not the annual dashboard."
      - "V1 excludes RICE scoring."
      - "Month tabs should be recolorable."
      - "Past/taken days should be gray and today should be highlighted automatically."
      - "Bottom `Main Objectives` and `Notes` sections are part of the monthly surface."
      - "A planner task can be started by an agent through a right-click/button plus prompt/context modal."
      - "Starting an agent should create or link project/goal/issue records in Multica and queue work."
      - "Planner context should be available to agents as today's priorities and month objectives."
      - "Agents should be able to retroactively update planner entries."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/month-map-planner-agent-dispatch/"
    command: "npx goalbuddy board /Users/saminyasar/Agent-Club/docs/goals/month-map-planner-agent-dispatch"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

