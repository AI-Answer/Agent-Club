    reasoning_hint: default
    objective: "Verify Peekaboo's current install, MCP, permissions, and agent-control model, then map the Agent Club MCP, Skills, Hermes, and UI surfaces that should host the setup."
    inputs:
      - "https://peekaboo.sh/"
      - "Current Agent Club repository."
      - "Existing MCP/Composio setup surfaces."
      - "Existing Skills Hub/JourneyKits surfaces."
      - "Existing Hermes dashboard/channel setup work."
