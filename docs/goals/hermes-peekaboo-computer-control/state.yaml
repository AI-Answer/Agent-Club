# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hermes Peekaboo Computer Control"
  slug: "hermes-peekaboo-computer-control"
  kind: specific
  tranche: "Prepare and then implement a safe Hermes-scoped Peekaboo computer-control setup path inside Agent Club MCP/Skills surfaces."
  status: active
  intake:
    original_request: "Add Peekaboo so Hermes can download/install it from MCP/Skills, then visibly control apps like Slack when the user presses a button."
    interpreted_outcome: "Agent Club should expose a Hermes-scoped computer-control setup and demo path powered by Peekaboo, with install/configuration, permissions, visible supervision, and safe stop boundaries."
    input_shape: specific
    audience: "Sam and future Agent Club users using Hermes as a personal chief of staff."
    authority: requested
    proof_type: demo
    completion_proof: "A live Agent Club demo shows Peekaboo available through MCP/Skills setup, readiness checks, Hermes-only enablement, and a supervised harmless Slack demo where the user can see and stop desktop control."
    likely_misfire: "Shipping a hidden MCP preset or generic automation hook that lets Hermes control the desktop without visible owner supervision, permission readiness, or a scoped demo path."
    blind_spots_considered:
      - "Peekaboo's current official install and MCP commands must be verified before implementation."
      - "macOS Screen Recording and Accessibility permissions must be surfaced as readiness gates."
      - "Computer control should be Hermes-scoped and opt-in."
      - "The product should make desktop activity visible, not hidden in logs."
      - "A Slack demo must be harmless and owner-approved before any live app control."
    existing_plan_facts:
      - "User referenced https://peekaboo.sh/ as the target tool."
      - "Peekaboo docs say it is a macOS automation toolkit that captures pixels, reads the accessibility tree, drives input, and exposes tools over MCP."
      - "Peekaboo docs show Homebrew install: brew install steipete/tap/peekaboo."
      - "Peekaboo docs show npm MCP launch: npx -y @steipete/peekaboo mcp."
      - "User wants this under the MCP and Skills surfaces, not a detached terminal-only setup."
      - "User imagines a button where Hermes opens Slack and the user watches it happen."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

