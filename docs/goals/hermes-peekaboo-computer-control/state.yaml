  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/hermes-peekaboo-computer-control/"
    command: "npx goalbuddy board /Users/saminyasar/Agent-Club/docs/goals/hermes-peekaboo-computer-control"
