      - "Do not install Peekaboo yet."
      - "Do not request or grant macOS permissions."
      - "Do not open or control Slack."
      - "Use official Peekaboo docs for commands and capability claims."
    expected_output:
      - "Official Peekaboo install and MCP configuration facts."
      - "Permission/readiness gates required for macOS automation."
      - "Relevant Agent Club files and routes for MCP setup, Skills Hub, Hermes config, dashboard widgets, and supervised run UI."
      - "Recommended implementation slices with allowed_files and verification commands."
    receipt:
      result: done
      summary: "Peekaboo is a current macOS desktop automation fit for Hermes: official docs show Homebrew CLI install, npm MCP launch with npx, stdio MCP transport, see/image/click/type/hotkey tools, and explicit Screen Recording plus Accessibility readiness gates. Agent Club already has the right product surfaces: MCP & Voice can save and sync stdio MCP servers, Skills Hub can host capability setup/discovery, and the Hermes dashboard already reads MCP config to show app/tool readiness."
      evidence:
        - "https://peekaboo.sh/install.html"
        - "https://peekaboo.sh/MCP.html"
        - "src/renderer/pages/settings/ToolsSettings/ComposioMcpSetup.tsx"
        - "src/process/services/dashboard/DashboardService.ts"
      source_evidence:
        - "https://peekaboo.sh/install.html: Homebrew install is brew install steipete/tap/peekaboo; npm MCP launch is npx -y @steipete/peekaboo mcp; verify with peekaboo --version, peekaboo permissions status, and peekaboo list apps."
        - "https://peekaboo.sh/MCP.html: Peekaboo exposes image, see, click, scroll, type, hotkey, set_value, and perform_action over stdio; http/sse are recognized but not implemented."
        - "https://peekaboo.sh/permissions.html: Screen Recording is required, Accessibility is recommended, Event Synthesizing is optional for background input."
        - "https://peekaboo.sh/quickstart.html: safe flow is permissions status/grant, screenshot, see, click/type, then optional MCP config."
        - "https://peekaboo.sh/commands/agent.html: agent command supports dry-run and session controls, and troubleshooting points back to permissions and target verification."
      repo_evidence:
        - "src/renderer/components/settings/SettingsModal/contents/ToolsModalContent.tsx hosts MCP setup cards and wraps saved servers with connection testing and agent sync."
        - "src/renderer/pages/settings/ToolsSettings/McpManagement.tsx is the page-mode MCP management surface and duplicates the same setup-card extension point."
        - "src/renderer/pages/settings/ToolsSettings/ComposioMcpSetup.tsx is the nearest existing pattern for a curated install/config card that saves a stdio MCP server."
        - "src/common/config/storage.ts defines IMcpServer stdio transport with command, args, and env."
        - "src/process/services/dashboard/DashboardService.ts builds the Hermes MCP app list from ProcessConfig mcp.config and can truthfully show a Peekaboo card once a server exists."
        - "src/renderer/pages/settings/SkillsHubSettings.tsx is the Skills Hub/JourneyKits surface, but it is larger and not necessary for the first MCP-install vertical slice."
      recommended_slices:
        - "First: add a Peekaboo Desktop Control MCP setup card to MCP & Voice/page-mode tools surfaces and the Hermes dashboard MCP app list."
        - "Next: add a Skills Hub/JourneyKit-style Peekaboo skill/card if the user still wants skills marketplace discoverability after MCP setup works."
        - "Later: implement supervised Slack demo only after explicit owner approval to control Slack."

