    commands:
      - "bunx vitest run tests/unit/PeekabooMcpSetup.dom.test.tsx tests/unit/peekabooPermissions.test.ts"
      - "bunx tsc --noEmit"
      - "git diff --check"
      - "Playwright/CDP live spot check for /settings/capabilities?tab=tools"
      - "Computer Use verified System Settings window: Accessibility"
